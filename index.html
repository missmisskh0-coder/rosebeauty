<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فروشگاه رز بیوتی</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  direction:rtl;
  background:#ffe6f0;
}

header{
  background:#ff2d7a;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:white;
  border-radius:12px;
  padding:10px;
  text-align:center;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}

.price{
  color:#ff2d7a;
  font-weight:bold;
}

button{
  background:#ff2d7a;
  color:white;
  border:none;
  padding:8px;
  width:100%;
  border-radius:8px;
  margin-top:5px;
}

.cart{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:white;
  padding:10px;
  border-top:2px solid #ff2d7a;
}

input{
  width:100%;
  padding:8px;
  margin-top:5px;
  border:1px solid #ccc;
  border-radius:6px;
}
</style>
</head>

<body>

<header>🌹 فروشگاه رز بیوتی</header>

<div class="grid">

  <div class="card">
    <img src="https://via.placeholder.com/300x200">
    <h3>رژ لب مات</h3>
    <div class="price">120,000 تومان</div>
    <button onclick="add('رژ لب',120000)">افزودن</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300x200">
    <h3>ریمل حجم‌دهنده</h3>
    <div class="price">180,000 تومان</div>
    <button onclick="add('ریمل',180000)">افزودن</button>
  </div>

</div>

<!-- سبد خرید + فرم -->
<div class="cart">

  🛒 تعداد: <span id="count">0</span>

  <input id="name" placeholder="نام">
  <input id="phone" placeholder="شماره">
  <input id="address" placeholder="آدرس">

  <button onclick="submitOrder()">ثبت سفارش</button>

</div>

<script>

let cart = [];

function add(name,price){
  cart.push({name,price});
  document.getElementById("count").innerText = cart.length;
}

function submitOrder(){

  if(cart.length === 0){
    alert("سبد خرید خالیه ❌");
    return;
  }

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  let order = {
    name,
    phone,
    address,
    items: cart,
    time: new Date().toLocaleString()
  };

  let orders = JSON.parse(localStorage.getItem("orders") || "[]");
  orders.push(order);
  localStorage.setItem("orders", JSON.stringify(orders));

  alert("سفارش ثبت شد 💖");

  cart = [];
  document.getElementById("count").innerText = 0;
}

</script>

</body>
</html>
